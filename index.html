<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘑菇小镇入住计划（mushroomandhunger.com）</title>
    <!-- 链接外部CSS文件 -->
    <link rel="stylesheet" href="styles/style.css">
    <style>
    /* 加载界面样式 - 暗红色背景 */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #8B0000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      font-family: 'Jingling', 'Microsoft YaHei', sans-serif;
    }
    
    .loading-content {
      text-align: center;
      color: white;
      max-width: 400px;
      width: 90%;
    }
    
    .loading-mushroom {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 1s ease-in-out infinite;
    }
    
    .loading-text {
      font-size: 24px;
      margin-bottom: 30px;
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    
    .loading-progress {
      width: 100%;
      height: 20px;
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }
    
    .loading-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #FF0000, #FFFFFF, #FF0000);
      border-radius: 10px;
      transition: width 0.2s ease-out;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    }
    
    .loading-percent {
      font-size: 36px;
      font-weight: bold;
      color: white;
      text-shadow: 
        0 0 10px #FF0000,
        0 0 20px #FFFFFF;
      font-family: 'HomuraBold', 'Jingling', sans-serif;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }
    </style>
</head>
<body>
    <!-- 加载界面 -->
    <div id="loading-overlay">
        <div class="loading-content">
            <div class="loading-mushroom">🍄</div>
            <div class="loading-text">蘑菇小镇加载中</div>
            <div class="loading-progress">
                <div class="loading-bar" id="loading-bar"></div>
            </div>
            <div class="loading-percent" id="loading-percent">0%</div>
        </div>
    </div>

    <!-- 主内容容器（loading结束后显示） -->
    <div class="main-content" style="opacity: 0; transition: opacity 0.5s;">
        <!-- 登录/注册选择界面 -->
        <div id="authChoice" class="auth-choice">
            <h2 class="auth-title">🍄 欢迎来到蘑菇小镇 🍄</h2>
            <p class="auth-subtitle">请选择</p>
            <div class="auth-buttons">
                <button id="showLoginBtn" class="auth-btn login-choice">登录</button>
                <button id="showRegisterBtn" class="auth-btn register-choice">注册</button>
            </div>
        </div>
        
        <!-- 登录表单（初始隐藏） -->
        <div id="loginForm" class="auth-form" style="display: none;">
            <h2 class="auth-title">🔐 登录蘑菇小镇</h2>
            <input type="text" id="loginUsername" class="auth-input" placeholder="输入你的名字" maxlength="20">
            <div class="auth-form-buttons">
                <button id="loginSubmitBtn" class="auth-btn login-choice">登录</button>
                <button id="backFromLogin" class="auth-btn back-btn">返回</button>
            </div>
            <div id="loginMessage" class="auth-message"></div>
        </div>
        
        <!-- 注册表单（初始隐藏） -->
        <div id="registerForm" class="auth-form" style="display: none;">
            <h2 class="auth-title">📝 注册蘑菇小镇</h2>
            <input type="text" id="registerUsername" class="auth-input" placeholder="输入你的名字" maxlength="20">
            <div class="auth-form-buttons">
                <button id="registerSubmitBtn" class="auth-btn register-choice">注册</button>
                <button id="backFromRegister" class="auth-btn back-btn">返回</button>
            </div>
            <div id="registerMessage" class="auth-message"></div>
        </div>
        
        <!-- 蘑菇小镇内容（初始隐藏） -->
        <div id="mushroomContent" style="display: none;">
            <!-- 用户登录模块（已登录状态显示） -->
            <div class="user-module">
                <div id="userLoggedIn" class="user-logged">
                    <span class="welcome-text">欢迎回来，</span>
                    <span id="displayUsername" class="username"></span>
                    <span class="mushroom-emoji">🍄</span>
                    <button id="logoutBtn" class="logout-btn">[退出]</button>
                </div>
            </div>
            
            <!-- 蘑菇小镇的内容卡片 -->
            <div class="magic-card">
                <span class="mushroom"></span>
                <span class="mushroom" style="animation-delay: 0.5s;"></span>
                <span class="mushroom" style="animation-delay: 1s;"></span>
                <span class="mushroom" style="animation-delay: 1.5s;"></span>
                
                <h1 class="glowing-title">
                    <span class="char1">蘑</span>
                    <span class="char2">菇</span>
                    <span class="char3">蘑</span>
                    <span class="char4">菇</span>
                </h1>
                
                <p class="welcome-text">
                    你好！幸运儿！欢迎来到蘑菇小镇！
                </p>
                
                <p class="magic-text">
                    嘘，不要走<br>体验无法逃离的幸福和喜悦吧
                </p>
                
                <div class="button-group">
                    <a href="#" class="magic-button red-button">小镇中心</a>
                    <a href="#" class="magic-button green-button">小镇历史</a>
                    <a href="#" class="magic-button blue-button">蘑菇图鉴</a>
                </div>
                
                <div class="sparkles">
                    <span class="sparkle"></span>
                    <span class="sparkle" style="animation-delay: 0.2s;"></span>
                    <span class="sparkle" style="animation-delay: 0.4s;"></span>
                    <span class="sparkle" style="animation-delay: 0.6s;"></span>
                    <span class="sparkle" style="animation-delay: 0.8s;"></span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 故障闪过容器 -->
    <div class="glitch-flash-container" id="glitchContainer"></div>
    
    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="images/MushroomBorn.MP3" type="audio/mpeg">
    </audio>
    
    <!-- 音乐控制按钮 -->
    <div class="music-control">
        <button id="musicToggle" class="music-btn">🔊 音乐</button>
    </div>
    
    <script src="scripts/main.js"></script>
</body>
</html>
