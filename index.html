<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘑菇小镇入住计划（mushroomandhunger.com）</title>
    <!-- 链接外部CSS文件 -->
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <!-- 蘑菇小镇的内容卡片 -->
    <div class="magic-card">
        <!-- 漂浮的蘑菇装饰（无包裹） -->
        <span class="mushroom"></span>
        <span class="mushroom" style="animation-delay: 0.5s;"></span>
        <span class="mushroom" style="animation-delay: 1s;"></span>
        <span class="mushroom" style="animation-delay: 1.5s;"></span>
        
        <!-- 主标题 - 每个字独立颜色，去掉emoji -->
        <h1 class="glowing-title">
            <span class="char1">蘑</span>
            <span class="char2">菇</span>
            <span class="char3">蘑</span>
            <span class="char4">菇</span>
        </h1>
        
        <!-- 欢迎文字 -->
        <p class="welcome-text">
            你好！幸运儿！欢迎来到蘑菇小镇！
        </p>
        
        <!-- 自定义文案 -->
        <p class="magic-text">
            嘘，不要走<br>体验无法逃离的幸福和喜悦吧
        </p>
        
        <!-- 按钮组（红绿蓝高饱和，无白边） -->
        <div class="button-group">
            <a href="#" class="magic-button red-button">小镇中心</a>
            <a href="#" class="magic-button green-button">小镇历史</a>
            <a href="#" class="magic-button blue-button">蘑菇图鉴</a>
        </div>
        
        <!-- 底部闪烁蘑菇星星 -->
        <div class="sparkles">
            <span class="sparkle"></span>
            <span class="sparkle" style="animation-delay: 0.2s;"></span>
            <span class="sparkle" style="animation-delay: 0.4s;"></span>
            <span class="sparkle" style="animation-delay: 0.6s;"></span>
            <span class="sparkle" style="animation-delay: 0.8s;"></span>
        </div>
    </div>
<!-- 故障闪过容器 -->
<div class="glitch-flash-container" id="glitchContainer"></div>

<script>
// 故障闪过效果触发器
function createGlitch() {
    const container = document.getElementById('glitchContainer');
    if (!container) return;
    
    // 清除旧的故障元素
    container.innerHTML = '';
    
    // 随机选择故障类型
    const glitchType = Math.floor(Math.random() * 5);
    
    switch(glitchType) {
        case 0: // 水平故障条
            for(let i = 0; i < 3; i++) {
                const flash = document.createElement('div');
                flash.className = 'glitch-flash';
                flash.style.top = Math.random() * 100 + '%';
                flash.style.animationDelay = (i * 0.1) + 's';
                container.appendChild(flash);
            }
            break;
            
        case 1: // 垂直故障条
            for(let i = 0; i < 3; i++) {
                const flash = document.createElement('div');
                flash.className = 'glitch-flash-vertical';
                flash.style.left = Math.random() * 100 + '%';
                flash.style.animationDelay = (i * 0.1) + 's';
                container.appendChild(flash);
            }
            break;
            
        case 2: // RGB故障块
            for(let i = 0; i < 5; i++) {
                const block = document.createElement('div');
                block.className = 'glitch-block';
                block.style.top = Math.random() * 80 + '%';
                block.style.left = Math.random() * 80 + '%';
                block.style.width = (100 + Math.random() * 200) + 'px';
                block.style.height = (50 + Math.random() * 100) + 'px';
                block.style.background = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},0.1)`;
                block.style.animationDelay = (i * 0.05) + 's';
                container.appendChild(block);
            }
            break;
            
        case 3: // 像素故障
            const pixel = document.createElement('div');
            pixel.className = 'pixel-glitch';
            container.appendChild(pixel);
            
            // 同时给标题添加文字故障
            const title = document.querySelector('.glowing-title');
            if(title) {
                title.style.animation = 'textGlitch 0.3s';
                setTimeout(() => {
                    title.style.animation = '';
                }, 300);
            }
            break;
            
        case 4: // 全屏闪烁
            document.body.style.backgroundColor = 'rgba(255,0,255,0.1)';
            document.body.style.transition = 'background-color 0.1s';
            setTimeout(() => {
                document.body.style.backgroundColor = '';
            }, 100);
            
            // 添加几个快速闪过的条
            for(let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const flash = document.createElement('div');
                    flash.className = 'glitch-flash';
                    flash.style.top = Math.random() * 100 + '%';
                    flash.style.animation = 'glitchFlash 0.15s ease-out forwards';
                    container.appendChild(flash);
                }, i * 30);
            }
            break;
    }
    
    // 一段时间后清除故障
    setTimeout(() => {
        container.innerHTML = '';
    }, 1000);
}

// 随机触发故障
function randomGlitch() {
    // 随机间隔触发故障（2-8秒之间）
    const interval = 2000 + Math.random() * 6000;
    
    setTimeout(() => {
        createGlitch();
        randomGlitch(); // 递归调用，持续触发
    }, interval);
}

// 页面加载完成后开始触发故障
document.addEventListener('DOMContentLoaded', () => {
    randomGlitch();
});

// 也可以鼠标移动时偶尔触发
let lastGlitchTime = 0;
document.addEventListener('mousemove', () => {
    const now = Date.now();
    // 每秒最多触发一次
    if(now - lastGlitchTime > 1000 && Math.random() < 0.01) {
        lastGlitchTime = now;
        createGlitch();
    }
});

// 点击时触发一次强故障
document.addEventListener('click', () => {
    for(let i = 0; i < 3; i++) {
        setTimeout(() => createGlitch(), i * 100);
    }
});
</script>
<!-- 背景音乐（无限循环） -->
<audio id="bgMusic" loop preload="auto">
  <source src="images/MushroomBorn.MP3" type="audio/mpeg">
  您的浏览器不支持音频播放。
</audio>

<!-- 音乐控制按钮 -->
<div class="music-control">
  <button id="musicToggle" class="music-btn">🔊 音乐</button>
</div>

<script>
// 背景音乐控制
document.addEventListener('DOMContentLoaded', function() {
  const audio = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicToggle');
  
  if (audio && musicBtn) {
    // 设置音量为50%，不会太吵
    audio.volume = 0.5;
    
    // 第一次点击页面任意位置时自动播放
    const playOnFirstClick = function() {
      audio.play().then(() => {
        musicBtn.innerHTML = '🔊 音乐';
        musicBtn.classList.remove('muted');
        console.log('🎵 蘑菇音乐开始播放');
      }).catch(e => {
        console.log('播放失败:', e);
        musicBtn.innerHTML = '⚠️ 点击播放';
      });
      document.removeEventListener('click', playOnFirstClick);
    };
    document.addEventListener('click', playOnFirstClick, { once: true });
    
    // 点击按钮切换播放/暂停
    musicBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (audio.paused) {
        audio.play();
        musicBtn.innerHTML = '🔊 音乐';
        musicBtn.classList.remove('muted');
      } else {
        audio.pause();
        musicBtn.innerHTML = '🔇 静音';
        musicBtn.classList.add('muted');
      }
    });
    
    // 音乐播放结束时自动重新开始（loop属性已经处理了）
    audio.addEventListener('ended', function() {
      console.log('🔄 音乐重新开始循环');
    });
  }
});
</script>

<style>
/* 音乐控制按钮样式 */
.music-control {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 10000;
}

.music-btn {
  background: rgba(0, 0, 0, 0.6);
  color: white;
  border: 2px solid #00FF00;
  border-radius: 50px;
  padding: 10px 20px;
  font-size: 16px;
  font-family: 'Jingling', 'Microsoft YaHei', sans-serif;
  cursor: pointer;
  backdrop-filter: blur(5px);
  transition: all 0.3s;
  box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
}

.music-btn:hover {
  background: rgba(0, 255, 0, 0.3);
  transform: scale(1.1);
  box-shadow: 0 0 25px #00FF00;
}

.music-btn.muted {
  opacity: 0.6;
  border-color: #666;
  box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
}
</style>
</body>
</html>
